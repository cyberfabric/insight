apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: dbt-run
  namespace: argo
  labels:
    app.kubernetes.io/part-of: ingestion
spec:
  entrypoint: run
  templates:
    - name: run
      inputs:
        parameters:
          - name: dbt_select
            default: "+tag:silver"
          - name: clickhouse_host
            default: "clickhouse.data.svc.cluster.local"
          - name: clickhouse_port
            default: "8123"
      activeDeadlineSeconds: 1800
      script:
        image: ghcr.io/cyberfabric/insight-toolbox:latest
        command: [bash]
        env:
          - name: CLICKHOUSE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: clickhouse-credentials
                key: password
        source: |
          cd /ingestion/dbt
          CH_PASS="${CLICKHOUSE_PASSWORD}"
          cat > profiles.yml <<PROFILES
          ingestion:
            target: k8s
            outputs:
              k8s:
                type: clickhouse
                host: "{{inputs.parameters.clickhouse_host}}"
                port: {{inputs.parameters.clickhouse_port}}
                schema: silver
                user: default
                password: "${CH_PASS}"
                secure: false
          PROFILES
          # Discover which bronze databases exist so connector models can skip missing ones
          AVAILABLE_DBS=$(curl -sf "http://{{inputs.parameters.clickhouse_host}}:{{inputs.parameters.clickhouse_port}}" \
            --data-urlencode "query=SELECT name FROM system.databases WHERE name LIKE 'bronze_%'" \
            --data-urlencode "user=default" \
            --data-urlencode "password=${CH_PASS}" \
            | tr '\n' ',' | sed 's/,$//')
          VARS="{available_dbs: [${AVAILABLE_DBS}]}"
          echo "Available bronze databases: ${AVAILABLE_DBS}"
          dbt run --profiles-dir . --select "{{inputs.parameters.dbt_select}}" --vars "${VARS}"
