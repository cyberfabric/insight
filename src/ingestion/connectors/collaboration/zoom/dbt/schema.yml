version: 2

sources:
  - name: bronze_zoom
    schema: bronze_zoom
    tables:
      - name: users
      - name: meetings
      - name: participants

models:
  - name: zoom__collab_meeting_activity
    description: "Zoom meeting activity aggregated per user per day → staging, feeds class_collab_meeting_activity"
    columns:
      - name: tenant_id
        tests:
          - not_null
      - name: insight_source_id
        tests:
          - not_null
      - name: unique_key
        tests:
          - not_null
          - unique
      - name: person_key
        tests:
          - not_null
      - name: date
        tests:
          - not_null

  - name: zoom__meeting
    description: "Zoom meeting (event grain) → staging, feeds class_meeting"
    columns:
      - name: tenant_id
        tests:
          - not_null
      - name: insight_source_id
        tests:
          - not_null
      - name: unique_key
        tests:
          - not_null
          - unique
      - name: meeting_uid
        tests:
          - not_null
      - name: data_source
        tests:
          - not_null
          - accepted_values:
              values: ['insight_zoom']

  - name: zoom__meeting_attendance
    description: "Zoom meeting participant sessions (event × person × session grain) → staging, feeds class_meeting_attendance"
    columns:
      - name: tenant_id
        tests:
          - not_null
      - name: insight_source_id
        tests:
          - not_null
      - name: unique_key
        tests:
          - not_null
          - unique
      - name: meeting_uid
        tests:
          - not_null
      - name: person_key
        tests:
          - not_null
      - name: data_source
        tests:
          - not_null
          - accepted_values:
              values: ['insight_zoom']
